naftiko: 1.0.0-alpha2
info:
  label: Langflow Users
  description: 'Langflow Users. 6 operations. Lead operation: Read All Users. Self-contained Naftiko capability covering one
    Langflow business surface.'
  tags:
  - Langflow
  - Users
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    LANGFLOW_API_KEY: LANGFLOW_API_KEY
    LANGFLOW_BASE_URL: LANGFLOW_BASE_URL
capability:
  consumes:
  - type: http
    namespace: users
    baseUri: '{{env.LANGFLOW_BASE_URL}}'
    description: Langflow Users business capability.
    resources:
    - name: api-v1-users
      path: /api/v1/users/
      operations:
      - name: read-all-users
        method: GET
        description: Read All Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skip
          in: query
          type: integer
          description: skip parameter.
          required: false
        - name: limit
          in: query
          type: integer
          description: limit parameter.
          required: false
        - name: search
          in: query
          type: string
          description: search parameter.
          required: false
      - name: add-user
        method: POST
        description: Add User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-users-whoami
      path: /api/v1/users/whoami
      operations:
      - name: read-current-user
        method: GET
        description: Read Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-users-user-id
      path: /api/v1/users/{user_id}
      operations:
      - name: delete-user
        method: DELETE
        description: Delete User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: user_id parameter.
          required: true
      - name: patch-user
        method: PATCH
        description: Patch User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: user_id parameter.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-users-user-id-reset-password
      path: /api/v1/users/{user_id}/reset-password
      operations:
      - name: reset-password
        method: PATCH
        description: Reset Password
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: user_id parameter.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.LANGFLOW_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: users-rest
    port: 8080
    description: REST adapter for Langflow Users.
    resources:
    - path: /v1/api/v1/users/
      name: api-v1-users
      description: REST surface for /api/v1/users/.
      operations:
      - method: GET
        name: read-all-users
        description: Read All Users
        call: users.read-all-users
        with:
          skip: rest.skip
          limit: rest.limit
          search: rest.search
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: add-user
        description: Add User
        call: users.add-user
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/users/whoami
      name: api-v1-users-whoami
      description: REST surface for /api/v1/users/whoami.
      operations:
      - method: GET
        name: read-current-user
        description: Read Current User
        call: users.read-current-user
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/users/{user_id}
      name: api-v1-users-user-id
      description: REST surface for /api/v1/users/{user_id}.
      operations:
      - method: DELETE
        name: delete-user
        description: Delete User
        call: users.delete-user
        with:
          user_id: rest.user_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch-user
        description: Patch User
        call: users.patch-user
        with:
          user_id: rest.user_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/users/{user_id}/reset-password
      name: api-v1-users-user-id-reset-password
      description: REST surface for /api/v1/users/{user_id}/reset-password.
      operations:
      - method: PATCH
        name: reset-password
        description: Reset Password
        call: users.reset-password
        with:
          user_id: rest.user_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Langflow Users. One tool per consumed operation.
    tools:
    - name: langflow-read-all-users
      description: Read All Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users.read-all-users
      with:
        skip: tools.skip
        limit: tools.limit
        search: tools.search
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-add-user
      description: Add User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: users.add-user
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-read-current-user
      description: Read Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users.read-current-user
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-delete-user
      description: Delete User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: users.delete-user
      with:
        user_id: tools.user_id
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-patch-user
      description: Patch User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: users.patch-user
      with:
        user_id: tools.user_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-reset-password
      description: Reset Password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: users.reset-password
      with:
        user_id: tools.user_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
