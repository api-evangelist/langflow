naftiko: 1.0.0-alpha2
info:
  label: Langflow Base
  description: 'Langflow Base. 6 operations. Lead operation: Get All. Self-contained Naftiko capability covering one Langflow
    business surface.'
  tags:
  - Langflow
  - Base
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    LANGFLOW_API_KEY: LANGFLOW_API_KEY
    LANGFLOW_BASE_URL: LANGFLOW_BASE_URL
capability:
  consumes:
  - type: http
    namespace: base
    baseUri: '{{env.LANGFLOW_BASE_URL}}'
    description: Langflow Base business capability.
    resources:
    - name: api-v1-all
      path: /api/v1/all
      operations:
      - name: get-all
        method: GET
        description: Get All
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-config
      path: /api/v1/config
      operations:
      - name: get-config
        method: GET
        description: Get Config
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-run-advanced-flow-id-or-name
      path: /api/v1/run/advanced/{flow_id_or_name}
      operations:
      - name: experimental-run-flow
        method: POST
        description: Experimental Run Flow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id_or_name
          in: path
          type: string
          description: flow_id_or_name parameter.
          required: true
        - name: user_id
          in: query
          type: string
          description: user_id parameter.
          required: false
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-v1-run-flow-id-or-name
      path: /api/v1/run/{flow_id_or_name}
      operations:
      - name: simplified-run-flow
        method: POST
        description: Simplified Run Flow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id_or_name
          in: path
          type: string
          description: flow_id_or_name parameter.
          required: true
        - name: stream
          in: query
          type: boolean
          description: stream parameter.
          required: false
        - name: user_id
          in: query
          type: string
          description: user_id parameter.
          required: false
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-v1-version
      path: /api/v1/version
      operations:
      - name: get-version
        method: GET
        description: Get Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-webhook-flow-id-or-name
      path: /api/v1/webhook/{flow_id_or_name}
      operations:
      - name: webhook-run-flow
        method: POST
        description: Webhook Run Flow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id_or_name
          in: path
          type: string
          description: flow_id_or_name parameter.
          required: true
        - name: user_id
          in: query
          type: string
          description: user_id parameter.
          required: false
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.LANGFLOW_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: base-rest
    port: 8080
    description: REST adapter for Langflow Base.
    resources:
    - path: /v1/api/v1/all
      name: api-v1-all
      description: REST surface for /api/v1/all.
      operations:
      - method: GET
        name: get-all
        description: Get All
        call: base.get-all
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/config
      name: api-v1-config
      description: REST surface for /api/v1/config.
      operations:
      - method: GET
        name: get-config
        description: Get Config
        call: base.get-config
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/run/advanced/{flow_id_or_name}
      name: api-v1-run-advanced-flow-id-or-name
      description: REST surface for /api/v1/run/advanced/{flow_id_or_name}.
      operations:
      - method: POST
        name: experimental-run-flow
        description: Experimental Run Flow
        call: base.experimental-run-flow
        with:
          flow_id_or_name: rest.flow_id_or_name
          user_id: rest.user_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/run/{flow_id_or_name}
      name: api-v1-run-flow-id-or-name
      description: REST surface for /api/v1/run/{flow_id_or_name}.
      operations:
      - method: POST
        name: simplified-run-flow
        description: Simplified Run Flow
        call: base.simplified-run-flow
        with:
          flow_id_or_name: rest.flow_id_or_name
          stream: rest.stream
          user_id: rest.user_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/version
      name: api-v1-version
      description: REST surface for /api/v1/version.
      operations:
      - method: GET
        name: get-version
        description: Get Version
        call: base.get-version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/webhook/{flow_id_or_name}
      name: api-v1-webhook-flow-id-or-name
      description: REST surface for /api/v1/webhook/{flow_id_or_name}.
      operations:
      - method: POST
        name: webhook-run-flow
        description: Webhook Run Flow
        call: base.webhook-run-flow
        with:
          flow_id_or_name: rest.flow_id_or_name
          user_id: rest.user_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: base-mcp
    port: 9090
    transport: http
    description: MCP adapter for Langflow Base. One tool per consumed operation.
    tools:
    - name: langflow-get-all
      description: Get All
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: base.get-all
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-get-config
      description: Get Config
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: base.get-config
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-experimental-run-flow
      description: Experimental Run Flow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: base.experimental-run-flow
      with:
        flow_id_or_name: tools.flow_id_or_name
        user_id: tools.user_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-simplified-run-flow
      description: Simplified Run Flow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: base.simplified-run-flow
      with:
        flow_id_or_name: tools.flow_id_or_name
        stream: tools.stream
        user_id: tools.user_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-get-version
      description: Get Version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: base.get-version
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-webhook-run-flow
      description: Webhook Run Flow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: base.webhook-run-flow
      with:
        flow_id_or_name: tools.flow_id_or_name
        user_id: tools.user_id
      outputParameters:
      - type: object
        mapping: $.
