      operations:
      - name: delete-vertex-builds
        method: DELETE
        description: Delete Vertex Builds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id
          in: query
          type: string
          description: flow_id parameter.
          required: true
      - name: get-vertex-builds
        method: GET
        description: Get Vertex Builds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id
          in: query
          type: string
          description: flow_id parameter.
          required: true
