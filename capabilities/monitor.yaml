        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id
          in: query
          type: string
          description: flow_id parameter.
          required: false
        - name: session_id
          in: query
          type: string
          description: session_id parameter.
          required: false
        - name: sender
          in: query
          type: string
          description: sender parameter.
          required: false
        - name: sender_name
          in: query
          type: string
          description: sender_name parameter.
          required: false
        - name: order_by
          in: query
          type: string
          description: order_by parameter.
          required: false
    - name: api-v1-monitor-messages-session-old-session-id
      path: /api/v1/monitor/messages/session/{old_session_id}
      operations:
      - name: update-session-id
        method: PATCH
        description: Update Session Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
