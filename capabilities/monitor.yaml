naftiko: 1.0.0-alpha2
info:
  label: Langflow Monitor
  description: 'Langflow Monitor. 15 operations. Lead operation: Delete Vertex Builds. Self-contained Naftiko capability covering
    one Langflow business surface.'
  tags:
  - Langflow
  - Monitor
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
