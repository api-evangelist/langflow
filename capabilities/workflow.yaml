naftiko: 1.0.0-alpha2
info:
  label: Langflow Workflow
  description: 'Langflow Workflow. 3 operations. Lead operation: Get Workflow Status. Self-contained Naftiko capability covering
    one Langflow business surface.'
  tags:
  - Langflow
  - Workflow
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    LANGFLOW_API_KEY: LANGFLOW_API_KEY
    LANGFLOW_BASE_URL: LANGFLOW_BASE_URL
capability:
  consumes:
  - type: http
    namespace: workflow
    baseUri: '{{env.LANGFLOW_BASE_URL}}'
    description: Langflow Workflow business capability.
    resources:
    - name: api-v2-workflows
      path: /api/v2/workflows
      operations:
      - name: get-workflow-status
        method: GET
        description: Get Workflow Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: job_id
          in: query
          type: string
          description: Job ID to query
          required: false
      - name: execute-workflow
        method: POST
        description: Execute Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-workflows-stop
      path: /api/v2/workflows/stop
      operations:
      - name: stop-workflow
        method: POST
        description: Stop Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.LANGFLOW_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: workflow-rest
    port: 8080
    description: REST adapter for Langflow Workflow.
    resources:
    - path: /v1/api/v2/workflows
      name: api-v2-workflows
      description: REST surface for /api/v2/workflows.
      operations:
      - method: GET
        name: get-workflow-status
        description: Get Workflow Status
        call: workflow.get-workflow-status
        with:
          job_id: rest.job_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: execute-workflow
        description: Execute Workflow
        call: workflow.execute-workflow
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/workflows/stop
      name: api-v2-workflows-stop
      description: REST surface for /api/v2/workflows/stop.
      operations:
      - method: POST
        name: stop-workflow
        description: Stop Workflow
        call: workflow.stop-workflow
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: workflow-mcp
    port: 9090
    transport: http
    description: MCP adapter for Langflow Workflow. One tool per consumed operation.
    tools:
    - name: langflow-get-workflow-status
      description: Get Workflow Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workflow.get-workflow-status
      with:
        job_id: tools.job_id
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-execute-workflow
      description: Execute Workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: workflow.execute-workflow
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-stop-workflow
      description: Stop Workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: workflow.stop-workflow
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
