naftiko: 1.0.0-alpha2
info:
  label: Langflow Traces
  description: 'Langflow Traces. 4 operations. Lead operation: Delete Traces By Flow. Self-contained Naftiko capability covering
    one Langflow business surface.'
  tags:
  - Langflow
  - Traces
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    LANGFLOW_API_KEY: LANGFLOW_API_KEY
    LANGFLOW_BASE_URL: LANGFLOW_BASE_URL
capability:
  consumes:
  - type: http
    namespace: traces
    baseUri: '{{env.LANGFLOW_BASE_URL}}'
    description: Langflow Traces business capability.
    resources:
    - name: api-v1-monitor-traces
      path: /api/v1/monitor/traces
      operations:
      - name: delete-traces-by-flow
        method: DELETE
        description: Delete Traces By Flow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id
          in: query
          type: string
          description: flow_id parameter.
          required: true
      - name: get-traces
        method: GET
        description: Get Traces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: flow_id
          in: query
          type: string
          description: flow_id parameter.
          required: false
        - name: session_id
          in: query
          type: string
          description: session_id parameter.
          required: false
        - name: status
          in: query
          type: string
          description: status parameter.
          required: false
        - name: query
          in: query
          type: string
          description: query parameter.
          required: false
        - name: start_time
          in: query
          type: string
          description: start_time parameter.
          required: false
        - name: end_time
          in: query
          type: string
          description: end_time parameter.
          required: false
        - name: page
          in: query
          type: integer
          description: page parameter.
          required: false
        - name: size
          in: query
          type: integer
          description: size parameter.
          required: false
    - name: api-v1-monitor-traces-trace-id
      path: /api/v1/monitor/traces/{trace_id}
      operations:
      - name: delete-trace
        method: DELETE
        description: Delete Trace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: trace_id
          in: path
          type: string
          description: trace_id parameter.
          required: true
      - name: get-trace
        method: GET
        description: Get Trace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: trace_id
          in: path
          type: string
          description: trace_id parameter.
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.LANGFLOW_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: traces-rest
    port: 8080
    description: REST adapter for Langflow Traces.
    resources:
    - path: /v1/api/v1/monitor/traces
      name: api-v1-monitor-traces
      description: REST surface for /api/v1/monitor/traces.
      operations:
      - method: DELETE
        name: delete-traces-by-flow
        description: Delete Traces By Flow
        call: traces.delete-traces-by-flow
        with:
          flow_id: rest.flow_id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-traces
        description: Get Traces
        call: traces.get-traces
        with:
          flow_id: rest.flow_id
          session_id: rest.session_id
          status: rest.status
          query: rest.query
          start_time: rest.start_time
          end_time: rest.end_time
          page: rest.page
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/monitor/traces/{trace_id}
      name: api-v1-monitor-traces-trace-id
      description: REST surface for /api/v1/monitor/traces/{trace_id}.
      operations:
      - method: DELETE
        name: delete-trace
        description: Delete Trace
        call: traces.delete-trace
        with:
          trace_id: rest.trace_id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-trace
        description: Get Trace
        call: traces.get-trace
        with:
          trace_id: rest.trace_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: traces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Langflow Traces. One tool per consumed operation.
    tools:
    - name: langflow-delete-traces-by-flow
      description: Delete Traces By Flow
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: traces.delete-traces-by-flow
      with:
        flow_id: tools.flow_id
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-get-traces
      description: Get Traces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: traces.get-traces
      with:
        flow_id: tools.flow_id
        session_id: tools.session_id
        status: tools.status
        query: tools.query
        start_time: tools.start_time
        end_time: tools.end_time
        page: tools.page
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-delete-trace
      description: Delete Trace
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: traces.delete-trace
      with:
        trace_id: tools.trace_id
      outputParameters:
      - type: object
        mapping: $.
    - name: langflow-get-trace
      description: Get Trace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: traces.get-trace
      with:
        trace_id: tools.trace_id
      outputParameters:
      - type: object
        mapping: $.
